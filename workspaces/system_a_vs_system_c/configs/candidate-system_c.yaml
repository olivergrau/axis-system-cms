system_type: "system_c"
experiment_type: "single_run"

logging:
  enabled: false
  console_enabled: true
  jsonl_enabled: false
  jsonl_path: "experiments/output/system-aw-exploration-demo.jsonl"
  verbosity: "compact"

general:
  seed: 42

execution:
  max_steps: 200
  trace_mode: "delta"
  parallelism_mode: "episodes"
  max_workers: 4

world:
  world_type: "grid_2d"
  grid_width: 20
  grid_height: 20
  obstacle_density: 0.2
  resource_regen_rate: 0.01
  resource_regen_cooldown_steps: 10
  topology: "bounded"
  regeneration_mode: "clustered"
  num_clusters: 3
  regen_eligible_ratio: 0.10

agent_start_position:
  x: 10
  y: 10

system:
  agent:
    initial_energy: 100.0
    max_energy: 100.0
    buffer_capacity: 30
  policy:
    selection_mode: "argmax"
    temperature: 10.0
    stay_suppression: 0.1
    consume_weight: 2.5
  transition:
    move_cost: 1.0
    consume_cost: 0.5
    stay_cost: 0.3
    max_consume: 1.0
    energy_gain_factor: 15.0
  prediction:
    memory_learning_rate: 0.10
    modulation_mode: "additive"
    prediction_bias_scale: 0.10
    prediction_bias_clip: 0.30
    context_threshold: 0.30
    frustration_rate: 0.05
    confidence_rate: 0.20
    positive_sensitivity: 2.5
    negative_sensitivity: 0.6
    modulation_min: 1.0
    modulation_max: 1.0
    positive_weights: [0.30, 0.175, 0.175, 0.175, 0.175]
    negative_weights: [0.45, 0.1375, 0.1375, 0.1375, 0.1375]

num_episodes_per_run: 50
