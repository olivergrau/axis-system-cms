system_type: "system_b"
experiment_type: "single_run"

general:
  seed: 42

execution:
  max_steps: 200

world:
  world_type: "signal_landscape"
  grid_width: 10
  grid_height: 10
  num_hotspots: 3
  hotspot_radius: 3.0
  drift_speed: 0.5
  decay_rate: 0.02
  obstacle_density: 0.0
  signal_intensity: 1.0

system:
  agent:
    initial_energy: 100.0
    max_energy: 100.0
  policy:
    selection_mode: "sample"
    temperature: 1.0
    scan_bonus: 2.0
  transition:
    move_cost: 1.0
    scan_cost: 0.5
    stay_cost: 0.5

logging:
  enabled: true
  console_enabled: false
  jsonl_enabled: true
  jsonl_path: "experiments/output/system-b-sdk-demo.jsonl"
  verbosity: "verbose"

num_episodes_per_run: 5
