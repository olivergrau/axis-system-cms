# Toroidal world demo (System A with wraparound edges)
system_type: "system_a"
experiment_type: "single_run"

general:
  seed: 42

execution:
  max_steps: 200

world:
  world_type: "toroidal"
  grid_width: 10
  grid_height: 10
  obstacle_density: 0.05
  resource_regen_rate: 0.03

system:
  agent:
    initial_energy: 50.0
    max_energy: 100.0
    memory_capacity: 5
  policy:
    selection_mode: "sample"
    temperature: 1.0
    stay_suppression: 0.1
    consume_weight: 1.5
  transition:
    move_cost: 1.0
    consume_cost: 1.0
    stay_cost: 0.5
    max_consume: 1.0
    energy_gain_factor: 10.0

num_episodes_per_run: 5
