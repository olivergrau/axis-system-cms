# Single-run baseline experiment (v0.2.0 format)
system_type: "system_a"
experiment_type: "single_run"

general:
  seed: 42

execution:
  max_steps: 200

world:
  grid_width: 10
  grid_height: 10
  obstacle_density: 0.0
  
system:
  agent:
    initial_energy: 50.0
    max_energy: 100.0
    memory_capacity: 5
  policy:
    selection_mode: "sample"
    temperature: 1.0
    stay_suppression: 0.1
    consume_weight: 2.5
  transition:
    move_cost: 1.0
    consume_cost: 1.0
    stay_cost: 0.5
    max_consume: 1.0
    energy_gain_factor: 10.0
  world_dynamics:
    resource_regen_rate: 0.2
    regeneration_mode: "sparse_fixed_ratio"
    regen_eligible_ratio: 0.17

num_episodes_per_run: 5
