# OFAT sweep over energy gain factor (v0.2.0 format)
system_type: "system_a"
experiment_type: "ofat"

general:
  seed: 42

execution:
  max_steps: 200

world:
  grid_width: 10
  grid_height: 10
  obstacle_density: 0.0
  resource_regen_cooldown_steps: 0
  topology: "bounded"

system:
  agent:
    initial_energy: 50.0
    max_energy: 100.0
    buffer_capacity: 5
  policy:
    selection_mode: "sample"
    temperature: 1.0
    stay_suppression: 0.1
    consume_weight: 1.5
  transition:
    move_cost: 1.0
    consume_cost: 1.0
    stay_cost: 0.5
    max_consume: 1.0
    energy_gain_factor: 10.0

logging:
  enabled: true
  console_enabled: true
  jsonl_enabled: false
  verbosity: "compact"

num_episodes_per_run: 5

parameter_path: "system.transition.energy_gain_factor"
parameter_values: [5.0, 10.0, 15.0, 20.0]
