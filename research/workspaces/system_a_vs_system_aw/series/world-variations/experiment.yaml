version: 1
workflow_type: experiment_series
workspace_type: system_comparison
title: System A vs System A+W World Variations
description: >
  Shared-world comparison series for System A versus System A+W. Both sides
  keep their system parameters fixed while the environment is varied
  symmetrically across reference and candidate configs.

defaults:
  export:
    comparison_summary: true
    candidate_run_summary: true
    reference_run_summary: false
  notes:
    scaffold_notes: true
  labels:
    measurement_label_pattern: "{experiment_id}"

experiments:
  - id: exp_01
    label: world-baseline-anchor
    title: Baseline World Anchor
    enabled: true
    notes: >
      Re-run the existing shared workspace world unchanged so the series has a
      clean common anchor.
    hypothesis:
      - This should reproduce the current reference-versus-candidate contrast under the clustered bounded world.
      - Later world manipulations can be interpreted relative to this shared anchor rather than to older manual runs.
    reference_config_delta:
      world:
        world_type: grid_2d
        grid_width: 20
        grid_height: 20
        obstacle_density: 0.2
        resource_regen_rate: 0.01
        resource_regen_cooldown_steps: 10
        topology: bounded
        regeneration_mode: clustered
        num_clusters: 3
        regen_eligible_ratio: 0.10
    candidate_config_delta:
      world:
        world_type: grid_2d
        grid_width: 20
        grid_height: 20
        obstacle_density: 0.2
        resource_regen_rate: 0.01
        resource_regen_cooldown_steps: 10
        topology: bounded
        regeneration_mode: clustered
        num_clusters: 3
        regen_eligible_ratio: 0.10

  - id: exp_02
    label: world-open-fast-regen
    title: Open World with Fast Uniform Regeneration
    enabled: true
    notes: >
      Reduce obstacles and speed up regeneration to test whether A+W's
      exploratory bias becomes more beneficial in a fluid, information-rich
      environment.
    hypothesis:
      - The performance gap between A and A+W may narrow or reverse if exploration is rewarded by rapid local change.
      - Revisit-heavy behavior from System A may become less costly because food recovers quickly.
      - A+W may still retain a coverage advantage, but with less survival penalty than in the baseline world.
    reference_config_delta:
      world:
        obstacle_density: 0.10
        resource_regen_rate: 0.03
        resource_regen_cooldown_steps: 4
        regeneration_mode: all_traversable
        regen_eligible_ratio: null
        num_clusters: null
    candidate_config_delta:
      world:
        obstacle_density: 0.10
        resource_regen_rate: 0.03
        resource_regen_cooldown_steps: 4
        regeneration_mode: all_traversable
        regen_eligible_ratio: null
        num_clusters: null

  - id: exp_03
    label: world-sparse-scarcity
    title: Sparse Scarcity Patches
    enabled: true
    notes: >
      Make rewards rarer and slower so that inefficient wandering is punished
      more strongly and rediscovery matters more.
    hypothesis:
      - System A may benefit from its stronger exploitation bias if productive cells are sparse.
      - A+W may cover more ground but pay for it with lower energy efficiency.
      - The comparison should reveal whether curiosity helps discovery enough to offset scarcity costs.
    reference_config_delta:
      world:
        obstacle_density: 0.22
        resource_regen_rate: 0.008
        resource_regen_cooldown_steps: 14
        regeneration_mode: sparse_fixed_ratio
        regen_eligible_ratio: 0.06
        num_clusters: null
    candidate_config_delta:
      world:
        obstacle_density: 0.22
        resource_regen_rate: 0.008
        resource_regen_cooldown_steps: 14
        regeneration_mode: sparse_fixed_ratio
        regen_eligible_ratio: 0.06
        num_clusters: null

  - id: exp_04
    label: world-rich-cluster-islands
    title: Rich Cluster Islands
    enabled: true
    notes: >
      Concentrate recovery into fewer richer regions so the systems are tested
      on repeated discovery and return to dynamic hotspots.
    hypothesis:
      - System A may do well once it settles into a productive island.
      - A+W may outperform if sensory or spatial novelty helps it relocate rich hubs after depletion.
      - Revisit structure should become a more informative discriminator than pure coverage.
    reference_config_delta:
      world:
        obstacle_density: 0.18
        resource_regen_rate: 0.025
        resource_regen_cooldown_steps: 6
        regeneration_mode: clustered
        regen_eligible_ratio: 0.08
        num_clusters: 2
    candidate_config_delta:
      world:
        obstacle_density: 0.18
        resource_regen_rate: 0.025
        resource_regen_cooldown_steps: 6
        regeneration_mode: clustered
        regen_eligible_ratio: 0.08
        num_clusters: 2

  - id: exp_05
    label: world-toroidal-wrap
    title: Toroidal Wraparound Grid
    enabled: true
    notes: >
      Remove hard borders while keeping the general resource structure close to
      baseline.
    hypothesis:
      - Trajectories should become less edge-constrained for both systems.
      - A+W may convert its exploratory tendency into more coherent long loops rather than boundary collisions.
      - The fairness of the side-by-side comparison is preserved because both systems face the same topology shift.
    reference_config_delta:
      world:
        topology: toroidal
    candidate_config_delta:
      world:
        topology: toroidal

  - id: exp_06
    label: world-compact-dense-feedback
    title: Compact Dense Feedback Arena
    enabled: true
    notes: >
      Shrink the map and increase local change frequency so both systems cycle
      through the same cells more often.
    hypothesis:
      - System A's exploitation bias may become more competitive in the tighter arena.
      - A+W may lose some of its coverage advantage because the search space is smaller.
      - Revisit metrics should rise for both systems, but possibly for different reasons.
    reference_config_delta:
      world:
        grid_width: 12
        grid_height: 12
        obstacle_density: 0.15
        resource_regen_rate: 0.018
        resource_regen_cooldown_steps: 5
        regeneration_mode: all_traversable
        regen_eligible_ratio: null
        num_clusters: null
    candidate_config_delta:
      world:
        grid_width: 12
        grid_height: 12
        obstacle_density: 0.15
        resource_regen_rate: 0.018
        resource_regen_cooldown_steps: 5
        regeneration_mode: all_traversable
        regen_eligible_ratio: null
        num_clusters: null

  - id: exp_07
    label: world-large-open-field
    title: Large Open Field
    enabled: true
    notes: >
      Expand the world and open it slightly to test whether A+W's broader
      exploration becomes more valuable in a larger search space.
    hypothesis:
      - System A may struggle to rediscover productive areas in the larger arena.
      - A+W may gain relative value if curiosity helps maintain broad search coverage.
      - Absolute coverage should rise for both, but the candidate may preserve a larger proportional lead.
    reference_config_delta:
      world:
        grid_width: 28
        grid_height: 28
        obstacle_density: 0.10
        resource_regen_rate: 0.012
        resource_regen_cooldown_steps: 10
        regeneration_mode: clustered
        regen_eligible_ratio: 0.08
        num_clusters: 4
    candidate_config_delta:
      world:
        grid_width: 28
        grid_height: 28
        obstacle_density: 0.10
        resource_regen_rate: 0.012
        resource_regen_cooldown_steps: 10
        regeneration_mode: clustered
        regen_eligible_ratio: 0.08
        num_clusters: 4
